<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enlaces</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --background: #F9FAFB;
            --surface: #FFFFFF;
            --primary: #3B82F6;
            --primary-hover: #2563EB;
            --text-primary: #1F2937;
            --text-secondary: #6B7280;
            --border: #E5E7EB;
            --shadow: rgba(0, 0, 0, 0.05);
            --error: #EF4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden; /* Prevent scroll when overlay is active */
        }

        .main-container {
            width: 100%;
            max-width: 560px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title-container {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .main-title {
            font-size: 2.25rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .subtitle {
            font-size: 1.125rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem;
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            text-decoration: none;
            color: var(--text-primary);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 1px 2px 0 var(--shadow);
        }

        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px 0 var(--shadow);
            border-color: var(--primary);
        }

        .link-content h2 {
            font-size: 1.125rem;
            font-weight: 500;
        }

        .link-icon {
            width: 1.5rem;
            height: 1.5rem;
            color: var(--text-secondary);
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .link-card:hover .link-icon {
            color: var(--primary);
            transform: translateX(3px);
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            .main-title {
                font-size: 1.875rem;
            }
            .subtitle {
                font-size: 1rem;
            }
            .link-card {
                padding: 1.25rem;
            }
        }

        /* Password Overlay Styles */
        .password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--background);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.3s ease;
        }

        .password-form-card {
            background-color: var(--surface);
            padding: 2.5rem;
            border-radius: 0.75rem;
            box-shadow: 0 10px 30px var(--shadow);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .password-form-card h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        .password-input {
            width: 100%;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-size: 1rem;
            color: var(--text-primary);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .password-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .password-input.error {
            border-color: var(--error);
        }

        .password-button {
            background-color: var(--primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
            width: 100%;
        }

        .password-button:hover {
            background-color: var(--primary-hover);
        }

        .error-message {
            color: var(--error);
            font-size: 0.875rem;
            margin-top: 0.5rem;
            height: 1.25rem; /* Reserve space to prevent layout shift */
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .error-message.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="password-overlay" id="passwordOverlay">
        <div class="password-form-card">
            <h2>Ingrese el código</h2>
            <input type="password" id="passwordInput" class="password-input" placeholder="Código">
            <p id="errorMessage" class="error-message"></p>
            <button id="submitPassword" class="password-button">Acceder</button>
        </div>
    </div>

    <main class="main-container" id="mainContent" style="display: none;">
        <div class="title-container">
            <h1 class="main-title">Enlaces</h1>
            <p class="subtitle">Seleccione una opción para continuar</p>
        </div>

        <div class="links-container">
            <a href="https://jworg.zoom.us/j/87106216703?pwd=YSt4WFBYMjF0ZEdLSDQrVlRrNVd2UT09" class="link-card" target="_blank" rel="noopener noreferrer">
                <div class="link-content">
                    <h2>Reunión Miércoles y Sábados</h2>
                </div>
                <svg class="link-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                </svg>
            </a>
            <a href="https://stream.jw.org/1737-5929-6585-3927" class="link-card" target="_blank" rel="noopener noreferrer">
                <div class="link-content">
                    <h2>Asamblea Regional</h2>
                </div>
                <svg class="link-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                </svg>
            </a>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const passwordOverlay = document.getElementById('passwordOverlay');
            const passwordInput = document.getElementById('passwordInput');
            const submitPasswordBtn = document.getElementById('submitPassword');
            const errorMessage = document.getElementById('errorMessage');
            const mainContent = document.getElementById('mainContent');

            submitPasswordBtn.addEventListener('click', function() {
                checkPassword();
            });

            passwordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    checkPassword();
                }
            });

            function checkPassword() {
                const encodedPassword = 'MTkxNA=='; // Base64 encoded '1914'
                const correctPassword = atob(encodedPassword); // Decode Base64
                if (passwordInput.value === correctPassword) {
                    passwordOverlay.style.opacity = '0';
                    setTimeout(() => {
                        passwordOverlay.style.display = 'none';
                        mainContent.style.display = 'block';
                    }, 300); // Match CSS transition duration
                } else {
                    errorMessage.textContent = 'Código incorrecto. Intente de nuevo.';
                    errorMessage.classList.add('visible');
                    passwordInput.classList.add('error');
                    setTimeout(() => {
                        errorMessage.classList.remove('visible');
                        passwordInput.classList.remove('error');
                        passwordInput.value = '';
                    }, 1500); // Clear error after 1.5 seconds
                }
            }
        });
    </script>
</body>
</html>
